services:
  app:
    build: .
    container_name: flask_app
    restart: always
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=my_secret_key
      - DB_USER=admin
      - DB_PASSWORD=admin1234
      - DB_HOST=mydb
      - DB_NAME=car_rental
    ports:
      - "8000:8000"
    depends_on:
       - mydb
    volumes:
      - .:/app
    networks:
      - app-network


  mydb:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: Rp123456
      MYSQL_DATABASE: car_rental
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

    
  nginx:
    image: nginx
    container_name: nginx-container
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - app-network
    environment:
      - DOMAIN_NAME=techprodevops.com


networks:
  app-network:
    driver: bridge

volumes:
  mysql_data: